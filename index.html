<!DOCTYPE html>
<html lang="en">
 <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="theme-color" content="#eaeffb">
    <meta name="mobile-web-app-capable" content="yes">　
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon-precomposed" sizes="144x144" href="./res/apple-touch-icon-144x144-precomposed.png">
    <meta name="viewport" content="width=device-width,user-scalable=no,initial-scale=1,maximum-scale=1,minimum-scale=1" />
    <title>your</title>
    <style>
        *{
            padding: 0;
            margin: 0;
            font-family: "PingFang SC", Helvetica, Tahoma, Arial, "Hiragino Sans GB", "Heiti SC", STXihei, "Microsoft YaHei", SimHei, "WenQuanYi Micro Hei";
        }
        html,body{
            background-color: #f4f4f6;
        }
        img{
            display: block;
            width: 100%;
            height: auto;
        }
        .header{
            position: fixed;
            display: flex;
            width: 100%;
            z-index: 999;
        }
        .content{
            position: relative;
            width: 100%;
            z-index: 1;
        }
        .cover-a {
            position: absolute;
            top: 10%;
            bottom: 0;
            left: 0;
            right: 0;
            height: 3%;
            width: 32%;
            z-index: 2;
        }
        .cover-b {
            position: absolute;
            top: 19%;
            bottom: 0;
            left: 0%;
            right: 0;
            height: 40%;
            width: 100%;
            z-index: 3;
        }
        .fg{
            position: absolute;
            top: 0%;
            width: 100%;
        }
        .name{
            position: absolute;
            top: 13.4%;
            left: 38.4%;
            font-size: 4vw;
            color: #000;
        }
        .date{
            position: absolute;
            top: 18.6%;
            left: 0%;
            width: 100%;
            font-size: 0vw;
            text-align: center;
        }
        #before-sec{
            font-size: 7.8vw;
            color: #000;
            font-weight: 700;
            user-select: none;
        }
        #sec{
            font-size: 7.8vw;
            color: #000;
            font-weight: 700;
            user-select: none;
        }
        #test{
            position: absolute;
            top: 67.3%;
            left: 6%;
            width: 44.3%;
            color: #fff;
            font-weight: 300;
            font-size: 3.2vw;
            text-align: center;
            user-select: none;
        }
    </style>
</head>

<body>
    <div class="content">
        <img class="fg" src="./res/fg.webp" />
        <img src="./res/bg.gif" />
        <div class="cover-a"></div>
        <div class="cover-b"></div>
        <div class="text">
            <span contenteditable="true" class="name">秦*瑞</span>
            <div class="date">
                <span id="before-sec">09-15 12:25:</span>
                <span id="sec">31</span>
            </div>
            <span id="test">2027-04-23 18:56</span>
        </div>
    </div>
</body>

<script type="text/javascript">
    function jump(){
        setTimeout("window.scrollTo(0, 50, 'instant')", 1000);
    }
    function showDate(){
        var d = new Date();
        var month = ((d.getMonth() + 1) < 10) ? ("0" + (d.getMonth() + 1)) : (d.getMonth() + 1);
        var date = (d.getDate() < 10) ? ("0" + d.getDate()) : d.getDate();
        var hour = (d.getHours() < 10) ? ("0" + d.getHours()) : d.getHours();
        var min = (d.getMinutes() < 10) ? ("0" + d.getMinutes()) : d.getMinutes();
        var sec = (d.getSeconds() < 10) ? ("0" + d.getSeconds()) : d.getSeconds();
        document.getElementById("before-sec").innerHTML = (month + "-" + date + " " + hour + ":" + min + ":");
    }
    function showSec(){
        var d = new Date();
        var month = ((d.getMonth() + 1) < 10) ? ("0" + (d.getMonth() + 1)) : (d.getMonth() + 1);
        var date = (d.getDate() < 10) ? ("0" + d.getDate()) : d.getDate();
        var hour = (d.getHours() < 10) ? ("0" + d.getHours()) : d.getHours();
        var min = (d.getMinutes() < 10) ? ("0" + d.getMinutes()) : d.getMinutes();
        var sec = (d.getSeconds() < 10) ? ("0" + d.getSeconds()) : d.getSeconds();
        document.getElementById("sec").innerHTML = (sec);
    }
    function showTest(){
        var d = new Date();
        d.setTime(d.getTime()-12*60*60*1000-0*60*1000);
        var month = ((d.getMonth() + 1) < 10) ? ("0" + (d.getMonth() + 1)) : (d.getMonth() + 1);
        var date = (d.getDate() < 10) ? ("0" + d.getDate()) : d.getDate();
        var hour = (d.getHours() < 13) ? "08" : 18;
        var min = (date < 7) ? (date + 53) : (date * 2 - 13);
        min = (min < 10) ? ("0" + min) : min;
        document.getElementById("test").innerHTML = (d.getFullYear() + "-" + month + "-" + date + " " + hour + ":" + min);
    }
    jump()
    showTest()
    setInterval(showDate, 1000)
    setInterval(showSec, 1000)
</script>
</html>
